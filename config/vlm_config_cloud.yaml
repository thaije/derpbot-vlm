model:
  # Promoted to default after the post-safety-rewrite re-benchmark (#12/#3):
  # gemma4 is the ONLY model that produced a true positive / success on
  # basement_find/easy (1/5 seeds; every other model got 0 detections across
  # 5 seeds). It detects fire_extinguisher where qwen3-vl/gemini navigate to
  # proximity but never publish a valid detection. qwen3-vl is preserved at
  # vlm_config_cloud_qwen3vl.yaml. Earlier #11 ranking (qwen3-vl by score)
  # was driven by overall_score, which is misleading for model choice.
  name: gemma4:31b-cloud
  backend: ollama-cloud

inference:
  rate_hz: 0.5
  max_retries: 3
  timeout_s: 60.0
  # Debug pause (wall-clock seconds) between VLM decision calls. 0 = off.
  # Useful for stepping through robot behaviour visually. The robot freezes
  # (safety layer still publishes zero velocity) so you can inspect the scene.
  debug_pause_s: 0.0

actions:
  forward:
    linear_x: 0.5
    angular_z: 0.0
  backward:
    linear_x: -0.3
    angular_z: 0.0
  left:
    linear_x: 0.0
    angular_z: 0.6
  right:
    linear_x: 0.0
    angular_z: -0.6
  stop:
    linear_x: 0.0
    angular_z: 0.0
  _publish_interval_s: 0.1

safety:
  min_range_m: 0.25
  forward_arc_deg: 30
  geometry_veto: false

ros:
  camera_topic: /derpbot_0/rgbd/image
  depth_topic: /derpbot_0/rgbd/depth_image
  lidar_topic: /derpbot_0/scan
  odom_topic: /derpbot_0/odom
  cmd_vel_topic: /derpbot_0/cmd_vel
  bumper_topic: /derpbot_0/bumper_contact
  detection_topic: /derpbot_0/detections
  mission_url: http://localhost:7400/mission
  use_sim_time: true